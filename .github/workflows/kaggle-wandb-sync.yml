name: Kaggle W&B Offline Sync

on:
  workflow_dispatch:
    inputs:
      notebook_dir:
        description: 'Notebook directory (e.g., march-machine-learning-mania-2026-work)'
        required: true
        type: string
      kernel_id:
        description: 'Kaggle kernel ID (e.g., yasunorim/march-mania-2026-elo-work)'
        required: true
        type: string

jobs:
  wandb-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install kaggle wandb lightgbm xgboost

      - name: Generate notebook (if generate_notebook.py exists)
        run: |
          DIR="${{ inputs.notebook_dir }}"
          if [ -f "$DIR/generate_notebook.py" ]; then
            echo "Running generate_notebook.py in $DIR"
            cd "$DIR" && python generate_notebook.py
          else
            echo "No generate_notebook.py found, skipping."
          fi

      - name: Wait if kernel is already running, then push
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          KERNEL_ID="${{ inputs.kernel_id }}"
          # Wait up to 10min if a previous run is still in progress
          for i in $(seq 1 20); do
            RAW=$(kaggle kernels status "$KERNEL_ID" 2>&1) || true
            echo "Raw pre-push output: $RAW"
            STATUS=$(echo "$RAW" | sed 's/.*has status "\([^"]*\)".*/\1/')
            echo "Pre-push check $i/20: STATUS='$STATUS'"
            if [ -z "$STATUS" ] || echo "$STATUS" | grep -qiE "COMPLETE|ERROR|CANCEL"; then
              break
            fi
            echo "Kernel still running, waiting 30s..."
            sleep 30
          done
          kaggle kernels push -p "${{ inputs.notebook_dir }}"

      - name: Poll until complete (max 20 x 30s = 10min)
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          KERNEL_ID="${{ inputs.kernel_id }}"
          for i in $(seq 1 20); do
            RAW=$(kaggle kernels status "$KERNEL_ID" 2>&1) || true
            echo "Raw output: $RAW"
            STATUS=$(echo "$RAW" | sed 's/.*has status "\([^"]*\)".*/\1/')
            echo "Attempt $i/20: $STATUS"
            if echo "$STATUS" | grep -qiE "COMPLETE"; then
              echo "Kernel completed successfully."
              break
            fi
            if echo "$STATUS" | grep -qiE "ERROR|CANCEL"; then
              echo "Kernel failed with status: $STATUS"
              exit 1
            fi
            if [ "$i" -eq 20 ]; then
              echo "Timeout: kernel did not complete in time."
              exit 1
            fi
            sleep 30
          done

      - name: Show kernel diagnostics on failure
        if: failure()
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          echo "=== Kernel ERROR: downloading diagnostics ==="
          SLUG=$(echo "${{ inputs.kernel_id }}" | cut -d'/' -f2)
          mkdir -p ./kernel_log_out
          kaggle kernels output "${{ inputs.kernel_id }}" -p ./kernel_log_out || true
          LOG_FILE="./kernel_log_out/${SLUG}.log"
          if [ -f "$LOG_FILE" ]; then
            echo "--- stdout ---"
            python3 -c "
import json
with open('$LOG_FILE') as f:
    entries = json.load(f)
for e in entries:
    if e.get('stream_name') == 'stdout':
        print(e['data'], end='')
" || true
            echo ""
            echo "--- last 30 stderr lines ---"
            python3 -c "
import json
with open('$LOG_FILE') as f:
    entries = json.load(f)
errs = [e['data'] for e in entries if e.get('stream_name') == 'stderr']
print(''.join(errs[-30:]), end='')
" || true
          else
            echo "No log file found. Files in kernel_log_out/:"
            ls -la ./kernel_log_out/ || true
          fi

      - name: Download kernel output
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ./kaggle_output
          kaggle kernels output "${{ inputs.kernel_id }}" -p ./kaggle_output

      - name: Show downloaded files
        run: find ./kaggle_output -type f || echo "(no files found)"

      - name: Sync W&B offline runs to cloud
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          WANDB_DIRS=$(find ./kaggle_output -type d -name "offline-run-*" 2>/dev/null)
          if [ -z "$WANDB_DIRS" ]; then
            echo "No offline-run-* directories found. Trying wandb sync --sync-all..."
            wandb sync --sync-all ./kaggle_output || echo "No wandb runs to sync."
          else
            echo "Found wandb run dirs:"
            echo "$WANDB_DIRS"
            for dir in $WANDB_DIRS; do
              echo "Syncing: $dir"
              wandb sync "$dir"
            done
          fi
          echo "W&B sync complete."
