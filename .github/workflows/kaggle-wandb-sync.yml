name: Kaggle W&B Offline Sync

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図（必須）'
        required: true
        type: string
      notebook_dir:
        description: 'Notebook directory (e.g., march-machine-learning-mania-2026-work)'
        required: true
        type: string
      kernel_id:
        description: 'Kaggle kernel ID (e.g., yasunorim/march-mania-2026-elo-work)'
        required: true
        type: string
      competition_slug:
        description: 'Competition slug for auto score recording (e.g., march-machine-learning-mania-2026). Leave empty to skip.'
        required: false
        type: string

jobs:
  wandb-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install kaggle wandb lightgbm xgboost

      - name: Generate notebook (if generate_notebook.py exists)
        run: |
          DIR="${{ inputs.notebook_dir }}"
          if [ -f "$DIR/generate_notebook.py" ]; then
            echo "Running generate_notebook.py in $DIR"
            cd "$DIR" && python generate_notebook.py
          else
            echo "No generate_notebook.py found, skipping."
          fi

      - name: Push and poll with GPU→CPU fallback
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          KERNEL_ID="${{ inputs.kernel_id }}"
          NB_DIR="${{ inputs.notebook_dir }}"
          METADATA="$NB_DIR/kernel-metadata.json"

          wait_for_idle() {
            for i in $(seq 1 20); do
              RAW=$(kaggle kernels status "$KERNEL_ID" 2>&1) || true
              echo "Pre-push check $i/20: $RAW"
              STATUS=$(echo "$RAW" | sed 's/.*has status "\([^"]*\)".*/\1/')
              if [ -z "$STATUS" ] || echo "$STATUS" | grep -qiE "COMPLETE|ERROR|CANCEL"; then
                return 0
              fi
              echo "Kernel still running, waiting 30s..."
              sleep 30
            done
          }

          poll_until_done() {
            # Wait for kernel to transition to RUNNING/QUEUED (stale status防止)
            echo "Waiting 60s for Kaggle to register push..."
            sleep 60
            echo "Waiting for kernel to start..."
            STARTED=false
            for i in $(seq 1 30); do
              RAW=$(kaggle kernels status "$KERNEL_ID" 2>&1) || true
              STATUS=$(echo "$RAW" | sed 's/.*has status "\([^"]*\)".*/\1/')
              if [ $((i % 5)) -eq 0 ]; then
                echo "Startup check $i/30: $STATUS"
              fi
              if echo "$STATUS" | grep -qiE "RUNNING|QUEUED"; then
                echo "Kernel is now running: $STATUS"
                STARTED=true
                break
              fi
              # If already COMPLETE (not EMPTY/ERROR), fast finish
              if [ "$STATUS" = "complete" ]; then
                echo "Kernel completed successfully."
                echo "RESULT=complete" >> "$GITHUB_ENV"
                return 0
              fi
              sleep 30
            done
            if [ "$STARTED" = "false" ]; then
              echo "Kernel never started (stuck at stale status). Last: $STATUS"
              echo "FAILURE_MSG=Kernel never started after push" >> "$GITHUB_ENV"
              return 1
            fi

            # Poll for completion (up to 90 min)
            for i in $(seq 1 180); do
              RAW=$(kaggle kernels status "$KERNEL_ID" 2>&1) || true
              STATUS=$(echo "$RAW" | sed 's/.*has status "\([^"]*\)".*/\1/')
              echo "Attempt $i/180: $STATUS"
              # COMPLETE_EMPTY = no output (error) — must check before COMPLETE
              if echo "$STATUS" | grep -qiE "complete_empty|ERROR|CANCEL"; then
                FAILURE_MSG=$(kaggle kernels status "$KERNEL_ID" 2>&1 || true)
                echo "Kernel failed: $FAILURE_MSG"
                echo "FAILURE_MSG=$FAILURE_MSG" >> "$GITHUB_ENV"
                return 1
              fi
              if echo "$STATUS" | grep -qiE "COMPLETE"; then
                echo "Kernel completed successfully."
                echo "RESULT=complete" >> "$GITHUB_ENV"
                return 0
              fi
              sleep 30
            done
            echo "Timeout: kernel did not complete in 90 minutes."
            return 1
          }

          # Record original GPU setting for restoration
          ORIG_GPU=$(python3 -c "import json; print(json.load(open('$METADATA')).get('enable_gpu','false'))")
          echo "ORIG_GPU=$ORIG_GPU" >> "$GITHUB_ENV"
          echo "Original enable_gpu: $ORIG_GPU"

          # --- Attempt 1: push as-is (GPU if configured) ---
          wait_for_idle
          echo "=== Attempt 1: pushing with enable_gpu=$ORIG_GPU ==="
          PUSH_OUTPUT=$(kaggle kernels push -p "$NB_DIR" 2>&1) || true
          echo "Push output: $PUSH_OUTPUT"

          # Check if push itself was rejected due to GPU quota/session limit
          GPU_QUOTA_HIT=false
          SESSION_LIMIT_HIT=false
          if echo "$PUSH_OUTPUT" | grep -qiE "session count.*reached"; then
            echo "GPU push rejected: concurrent session limit."
            SESSION_LIMIT_HIT=true
            GPU_QUOTA_HIT=true
          elif echo "$PUSH_OUTPUT" | grep -qiE "quota.*reached|GPU quota"; then
            echo "GPU push rejected: weekly quota exhausted."
            GPU_QUOTA_HIT=true
          fi

          if [ "$GPU_QUOTA_HIT" = "false" ]; then
            if poll_until_done; then
              echo "Success on first attempt."
              exit 0
            fi
          fi

          # --- Session limit: wait and retry GPU (other kernels may finish) ---
          if [ "$SESSION_LIMIT_HIT" = "true" ]; then
            echo "=== GPU session limit — waiting for other kernels to finish ==="
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"content": "⏳ **GPUセッション上限 → 空き待ちリトライ**\nKernel: `'"$KERNEL_ID"'`\n5分間隔で最大12回リトライします。"}' || true

            for retry in $(seq 1 12); do
              echo "GPU retry $retry/12: waiting 5 minutes..."
              sleep 300
              wait_for_idle
              PUSH_OUTPUT=$(kaggle kernels push -p "$NB_DIR" 2>&1) || true
              echo "Retry $retry push output: $PUSH_OUTPUT"
              if ! echo "$PUSH_OUTPUT" | grep -qiE "session count.*reached|quota.*reached|GPU quota"; then
                echo "GPU push accepted on retry $retry."
                if poll_until_done; then
                  echo "Success on GPU retry."
                  exit 0
                else
                  echo "Kernel failed after GPU retry."
                  exit 1
                fi
              fi
              echo "Still blocked, retrying..."
            done
            echo "All 12 GPU retries exhausted. Falling back to CPU."
          fi

          # --- Check if failure is GPU-quota related ---
          if [ "$ORIG_GPU" != "true" ]; then
            echo "GPU was not enabled; no fallback to try."
            exit 1
          fi

          # GPU was enabled and kernel failed → always try CPU fallback
          FAILURE_MSG="${FAILURE_MSG:-unknown}"
          echo "GPU kernel failed ($FAILURE_MSG) → CPU fallback."

          # --- Attempt 2: fallback to CPU ---
          echo "=== Falling back to CPU... ==="
          python3 -c "
          import json
          with open('$METADATA') as f:
              meta = json.load(f)
          meta['enable_gpu'] = 'false'
          with open('$METADATA', 'w') as f:
              json.dump(meta, f, indent=2)
          print('Switched enable_gpu to false')
          "

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"content": "⚠️ **GPU失敗 → CPUフォールバック**\nKernel: `'"$KERNEL_ID"'`\n理由: '"${FAILURE_MSG:-unknown}"'\nCPUで再実行します。"}' || true

          wait_for_idle
          kaggle kernels push -p "$NB_DIR"

          if poll_until_done; then
            echo "Success on CPU fallback."
          else
            echo "CPU fallback also failed."
            exit 1
          fi

      - name: Restore original GPU setting in metadata
        if: always()
        run: |
          METADATA="${{ inputs.notebook_dir }}/kernel-metadata.json"
          ORIG_GPU="${{ env.ORIG_GPU }}"
          if [ -n "$ORIG_GPU" ]; then
            python3 -c "
          import json
          with open('$METADATA') as f:
              meta = json.load(f)
          meta['enable_gpu'] = '$ORIG_GPU'
          with open('$METADATA', 'w') as f:
              json.dump(meta, f, indent=2)
          print('Restored enable_gpu to $ORIG_GPU')
          "
          fi

      - name: Notify Discord on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **ワークフロー失敗**\nKernel: \`${{ inputs.kernel_id }}\`\nhttps://github.com/yasumorishima/kaggle-competitions/actions\"}" || true

      - name: Show kernel diagnostics on failure
        if: failure()
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          echo "=== Kernel ERROR: downloading diagnostics ==="
          SLUG=$(echo "${{ inputs.kernel_id }}" | cut -d'/' -f2)
          mkdir -p ./kernel_log_out
          kaggle kernels output "${{ inputs.kernel_id }}" -p ./kernel_log_out || true
          LOG_FILE="./kernel_log_out/${SLUG}.log"
          if [ -f "$LOG_FILE" ]; then
            echo "--- stdout ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); [print(e['data'],end='') for e in entries if e.get('stream_name')=='stdout']" || true
            echo ""
            echo "--- last 30 stderr lines ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); errs=[e['data'] for e in entries if e.get('stream_name')=='stderr']; print(''.join(errs[-30:]),end='')" || true
          else
            echo "No log file found. Files in kernel_log_out/:"
            ls -la ./kernel_log_out/ || true
          fi

      - name: Download kernel output
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p ./kaggle_output
          kaggle kernels output "${{ inputs.kernel_id }}" -p ./kaggle_output

      - name: Show downloaded files
        run: find ./kaggle_output -type f || echo "(no files found)"

      - name: Save submission as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-submission-${{ github.run_number }}
          path: ./kaggle_output/submission.csv
          retention-days: 90
          if-no-files-found: ignore

      - name: Check duplicate submission
        env:
          GH_TOKEN: ${{ github.token }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          SUB_FILE=$(find ./kaggle_output -name "submission.csv" | head -1)
          if [ -z "$SUB_FILE" ]; then
            echo "No submission.csv found. Skipping duplicate check."
            exit 0
          fi

          RESULT=$(python3 <<'PYEOF'
          import csv, os, subprocess, sys, tempfile, zipfile
          import numpy as np

          sub_file = os.environ.get("SUB_FILE", "")
          if not sub_file or not os.path.exists(sub_file) or os.path.getsize(sub_file) < 10:
              print("SKIP")
              sys.exit(0)

          new_vals = np.array([float(row[-1]) for row in csv.reader(open(sub_file)) if row])
          output = subprocess.run(
              ["gh", "api", f"repos/{os.environ["GITHUB_REPOSITORY"]}/actions/artifacts",
               "--jq", '.artifacts[] | select(.name | startswith("kaggle-submission-")) | .id'],
              capture_output=True, text=True
          ).stdout.strip()

          if not output:
              print("OK")
              sys.exit(0)

          for art_id in output.splitlines()[:5]:
              tmpdir = tempfile.mkdtemp()
              subprocess.run(
                  ["gh", "api", f"repos/{os.environ["GITHUB_REPOSITORY"]}/actions/artifacts/{art_id}/zip",
                   "--output", f"{tmpdir}/art.zip"], capture_output=True)
              try:
                  with zipfile.ZipFile(f"{tmpdir}/art.zip") as z:
                      for name in z.namelist():
                          if name.endswith(".csv"):
                              with z.open(name) as f:
                                  old_vals = np.array([float(r[-1]) for r in csv.reader(
                                      (line.decode() for line in f)) if r])
                              if len(old_vals) == len(new_vals):
                                  corr = np.corrcoef(old_vals, new_vals)[0, 1]
                                  print(f"art_{art_id}_corr_{corr:.6f}")
                                  if corr > 0.99:
                                      print("DUPLICATE")
                                      sys.exit(0)
              except:
                  pass
          print("OK")
          PYEOF
          )

          echo "Duplicate check result: $RESULT"
          if echo "$RESULT" | grep -q "DUPLICATE"; then
            echo "⚠️ Duplicate submission detected!"
            curl -s -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"⚠️ **重複提出警告！提出しないでください**\nKernel: \`${{ inputs.kernel_id }}\`\n過去のsubmissionと相関0.99以上です。\"}" || true
          fi

      - name: Sync W&B offline runs to cloud
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          WANDB_DIRS=$(find ./kaggle_output -type d -name "offline-run-*" 2>/dev/null)
          if [ -z "$WANDB_DIRS" ]; then
            echo "No offline-run-* directories found. Trying wandb sync --sync-all..."
            wandb sync --sync-all ./kaggle_output || echo "No wandb runs to sync."
          else
            echo "Found wandb run dirs:"
            echo "$WANDB_DIRS"
            for dir in $WANDB_DIRS; do
              echo "Syncing: $dir"
              wandb sync "$dir"
            done
          fi
          echo "W&B sync complete."

      - name: Notify Discord (complete)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COMP="${{ inputs.competition_slug }}"
          KAGGLE_URL="https://www.kaggle.com/code/${{ inputs.kernel_id }}"
          if [ -n "$COMP" ]; then
            SUBMIT_URL="https://www.kaggle.com/competitions/${COMP}/submit"
            MSG="✅ **Kernel完了 & W&B sync完了**\nKernel: \`${{ inputs.kernel_id }}\`\nCompetition: \`${COMP}\`\n\n👉 **提出**: ${SUBMIT_URL}\n📓 Notebook: ${KAGGLE_URL}"
          else
            MSG="✅ **Kernel完了 & W&B sync完了**\nKernel: \`${{ inputs.kernel_id }}\`\nMemo: ${{ inputs.memo }}\n\n👉 ${KAGGLE_URL}"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"${MSG}\"}" || true

      - name: Wait for submission and record LB score to W&B
        if: inputs.competition_slug != ''
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          SLUG="${{ inputs.competition_slug }}"
          echo "Waiting for a new submission to $SLUG ..."
          echo "Please submit via browser now. This step will wait up to 2 hours."

          # Count current submissions as baseline
          BEFORE=$(kaggle competitions submissions list -c "$SLUG" --csv 2>/dev/null | tail -n +2 | wc -l)
          echo "Current submission count: $BEFORE"

          # Poll every 30s for up to 240 attempts (2 hours)
          SCORE=""
          for i in $(seq 1 240); do
            sleep 30
            CSV=$(kaggle competitions submissions list -c "$SLUG" --csv 2>/dev/null | tail -n +2)
            AFTER=$(echo "$CSV" | wc -l)
            if [ "$AFTER" -gt "$BEFORE" ]; then
              # New submission found — grab latest complete one
              SCORE=$(echo "$CSV" | awk -F',' 'tolower($4)=="complete" && $5!="None" {print $5; exit}')
              if [ -n "$SCORE" ]; then
                RANK=$(echo "$CSV" | awk -F',' 'tolower($4)=="complete" && $5!="None" {print NR; exit}')
                echo "New submission detected! publicScore=$SCORE (position $RANK in list)"
                break
              fi
            fi
            echo "Attempt $i/240: waiting for submission..."
          done

          if [ -z "$SCORE" ]; then
            echo "No new scored submission detected within 2 hours. Skipping W&B score recording."
            exit 0
          fi

          # Record to W&B
          METADATA=$(find ./kaggle_output -name "wandb-metadata.json" | head -1)
          if [ -z "$METADATA" ]; then
            echo "No wandb-metadata.json found, skipping W&B recording."
            exit 0
          fi
          ENTITY=$(python3 -c "import json; d=json.load(open('$METADATA')); print(d.get('entity',''))")
          PROJECT=$(python3 -c "import json; d=json.load(open('$METADATA')); print(d.get('project',''))")
          RUN_ID=$(python3 -c "import json; d=json.load(open('$METADATA')); print(d.get('run_id',''))")
          echo "Recording to W&B run: $ENTITY/$PROJECT/$RUN_ID"
          pip install -q kaggle-wandb-sync
          kaggle-wandb-sync score "$ENTITY/$PROJECT/$RUN_ID" --score "$SCORE"

          # Notify Discord
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ **スコア記録完了！**\nCompetition: \`$SLUG\`\nScore: \`$SCORE\`\nW&B: https://wandb.ai/$ENTITY/$PROJECT/runs/$RUN_ID\"}"
