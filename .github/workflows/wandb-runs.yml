name: W&B Run Summary

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図（必須）'
        required: true
        type: string
jobs:
  summary:
    runs-on: ubuntu-latest

    steps:
      - name: Install wandb
        run: pip install wandb

      - name: Fetch recent runs
        env:
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          import wandb

          ENTITY = "fw_yasu11-personal"
          PROJECTS = [
              "nir-moisture",
              "march-machine-learning-mania-2026",
              "heart-disease-s6e2",
          ]

          api = wandb.Api()

          all_rows = {}
          for project in PROJECTS:
              try:
                  runs = api.runs(f"{ENTITY}/{project}", order="-created_at", per_page=10)
                  run_list = list(runs)
              except Exception as e:
                  all_rows[project] = {"error": str(e)}
                  continue
              rows = []
              for run in run_list:
                  name = run.name or run.id
                  state = run.state
                  metrics = []
                  for key in ["LB", "OOF", "val_loss", "best_score", "rmse"]:
                      val = run.summary.get(key)
                      if val is not None:
                          metrics.append(f"{key}={val:.4f}" if isinstance(val, float) else f"{key}={val}")
                  metric_str = ", ".join(metrics) if metrics else "-"
                  url = f"https://wandb.ai/{ENTITY}/{project}/runs/{run.id}"
                  rows.append((name, state, metric_str, url))
              all_rows[project] = rows

          # stdout（gh run view --log で取得可能）
          for project, rows in all_rows.items():
              print(f"\n### {project}")
              if isinstance(rows, dict):
                  print(f"  Error: {rows['error']}")
                  continue
              if not rows:
                  print("  No runs found.")
                  continue
              print(f"  {'Run':<30} {'State':<12} Metrics")
              print("  " + "-" * 70)
              for name, state, metrics, url in rows:
                  icon = "✅" if state == "finished" else ("🔄" if state == "running" else "❌")
                  print(f"  {icon} {name:<28} {state:<12} {metrics}")

          # GitHub Step Summary
          out = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(out, "a", encoding="utf-8") as f:
              f.write("## W&B Recent Runs\n\n")
              for project, rows in all_rows.items():
                  if isinstance(rows, dict):
                      f.write(f"### {project}\n\n_Error: {rows['error']}_\n\n")
                      continue
                  if not rows:
                      f.write(f"### {project}\n\n_No runs found._\n\n")
                      continue
                  f.write(f"### {project} ({len(rows)} recent)\n\n")
                  f.write("| Run | State | Key Metrics |\n|---|---|---|\n")
                  for name, state, metrics, url in rows:
                      icon = "✅" if state == "finished" else ("🔄" if state == "running" else "❌")
                      f.write(f"| [{name}]({url}) | {icon} {state} | {metrics} |\n")
                  f.write("\n")
          EOF
