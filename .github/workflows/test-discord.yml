name: Test Discord Notification

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test notification
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "⚡ **テスト通知**\nDiscord通知の設定が完了しました！\nKaggle W&B Sync ワークフローからの通知です。"}' && echo "sent"
