name: Upload BEATs Pretrained to Kaggle

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図（必須）'
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "Memo: ${{ github.event.inputs.memo }}"
        run: echo "${{ github.event.inputs.memo }}"

      - name: Install Kaggle CLI
        run: pip install -q kaggle

      - name: Setup Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Download BEATs checkpoint + code
        run: |
          mkdir -p beats-pretrained
          cd beats-pretrained

          # BEATs iter3+ AS2M fine-tuned cpt2 from HuggingFace (~370MB)
          # Fine-tuned on AudioSet = better embeddings for sound classification
          echo "Downloading BEATs checkpoint from HuggingFace..."
          wget -q "https://huggingface.co/camenduru/beats/resolve/main/BEATs_iter3_plus_AS2M_finetuned_on_AS2M_cpt2.pt" \
            -O BEATs_iter3_plus_AS2M.pt

          # BEATs source code — try multiple sources
          echo "Downloading BEATs source code..."
          BASE_URLS=(
            "https://raw.githubusercontent.com/microsoft/unilm/master/beats"
            "https://raw.githubusercontent.com/microsoft/unilm/refs/heads/master/beats"
            "https://huggingface.co/hubfor/microsoft-beats-model/resolve/main"
          )
          for f in BEATs.py backbone.py modules.py quantizer.py Tokenizers.py; do
            DOWNLOADED=false
            for base in "${BASE_URLS[@]}"; do
              if wget -q "$base/$f" -O "$f" 2>/dev/null && [ -s "$f" ]; then
                echo "  $f from $base"
                DOWNLOADED=true
                break
              fi
            done
            if [ "$DOWNLOADED" = false ]; then
              echo "WARNING: Failed to download $f from any source"
            fi
          done

          ls -lh
          echo "Download complete"

      - name: Verify checkpoint
        run: |
          cd beats-pretrained
          # Check file size (should be ~370MB)
          SIZE=$(stat -c%s BEATs_iter3_plus_AS2M.pt)
          echo "Checkpoint size: $SIZE bytes"
          if [ "$SIZE" -lt 100000000 ]; then
            echo "ERROR: Checkpoint too small, download may have failed"
            exit 1
          fi
          # Verify it's a valid file (check magic bytes for PyTorch/ZIP format)
          FILE_TYPE=$(file BEATs_iter3_plus_AS2M.pt)
          echo "File type: $FILE_TYPE"
          if echo "$FILE_TYPE" | grep -q "Zip\|data"; then
            echo "Checkpoint verified OK (valid binary file)"
          else
            echo "WARNING: Unexpected file type, but proceeding"
          fi
          echo "All source files:"
          ls -lh *.py *.pt

      - name: Create Kaggle dataset metadata
        run: |
          cd beats-pretrained
          cat > dataset-metadata.json << 'METADATA'
          {
            "title": "BEATs iter3+ AS2M Pretrained",
            "id": "yasunorim/beats-pretrained",
            "licenses": [
              {"name": "MIT"}
            ]
          }
          METADATA

      - name: Upload to Kaggle
        run: |
          cd beats-pretrained
          # Check if dataset already exists
          if kaggle datasets status yasunorim/beats-pretrained 2>/dev/null; then
            echo "Dataset exists, creating new version..."
            kaggle datasets version -p . -m "BEATs iter3+ AS2M checkpoint + source code" --quiet
          else
            echo "Creating new dataset..."
            kaggle datasets create -p . --public --quiet
          fi
          echo "Upload complete"

      - name: Verify dataset on Kaggle
        run: |
          sleep 10
          kaggle datasets files yasunorim/beats-pretrained
