name: Check Competitions

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図（必須）'
        required: true
        type: string
jobs:
  kaggle:
    name: Kaggle Active Competitions
    runs-on: ubuntu-latest

    steps:
      - name: Install Kaggle
        run: pip install kaggle

      - name: Fetch and summarize competitions
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, kaggle
          from datetime import datetime
          from pathlib import Path

          kaggle_dir = Path.home() / ".kaggle"
          kaggle_dir.mkdir(exist_ok=True)
          (kaggle_dir / "kaggle.json").write_text(os.environ["KAGGLE_API_TOKEN"])
          (kaggle_dir / "kaggle.json").chmod(0o600)

          api = kaggle.KaggleApi()
          api.authenticate()

          response = api.competitions_list(sort_by="latestDeadline", page_size=50)
          comps = response.competitions if hasattr(response, "competitions") else list(response)

          now = datetime.utcnow()  # naive UTC で統一
          active = []
          for c in comps:
              deadline = getattr(c, "deadline", None)
              if deadline is None:
                  continue
              if isinstance(deadline, str):
                  try:
                      deadline = datetime.fromisoformat(deadline.replace("Z", ""))
                  except Exception:
                      continue
              # aware datetime を naive に変換
              if hasattr(deadline, "tzinfo") and deadline.tzinfo is not None:
                  deadline = deadline.replace(tzinfo=None)
              if deadline > now:
                  active.append((deadline, c))

          active.sort(key=lambda x: x[0])

          print(f"## Kaggle Active Competitions ({len(active)} active)\n")
          print(f"{'Deadline':<12} {'Category':<18} {'Reward':<12} {'Teams':<6} Title")
          print("-" * 85)
          for deadline, c in active:
              title = (getattr(c, "title", "") or "")[:45]
              dl = str(deadline)[:10]
              category = getattr(c, "category", "-") or "-"
              reward = getattr(c, "reward", "-") or "-"
              teams = str(getattr(c, "team_count", None) or getattr(c, "teamCount", "-"))
              print(f"{dl:<12} {category:<18} {reward:<12} {teams:<6} {title}")

          out = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(out, "a", encoding="utf-8") as f:
              f.write(f"## Kaggle Active Competitions ({len(active)} active)\n\n")
              f.write("| Competition | Deadline | Category | Reward | Teams |\n")
              f.write("|---|---|---|---|---|\n")
              for deadline, c in active:
                  title = (getattr(c, "title", "") or "")[:50]
                  dl = str(deadline)[:10]
                  category = getattr(c, "category", "-") or "-"
                  reward = getattr(c, "reward", "-") or "-"
                  teams = str(getattr(c, "team_count", None) or getattr(c, "teamCount", "-"))
                  url = f"https://www.kaggle.com/competitions/{getattr(c, 'ref', '')}"
                  f.write(f"| [{title}]({url}) | {dl} | {category} | {reward} | {teams} |\n")
          EOF
