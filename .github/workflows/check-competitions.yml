name: Check Competitions

on:
  workflow_dispatch:

jobs:
  kaggle:
    name: Kaggle Active Competitions
    runs-on: ubuntu-latest

    steps:
      - name: Install Kaggle
        run: pip install kaggle

      - name: Fetch and summarize competitions
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os, kaggle

          from pathlib import Path
          kaggle_dir = Path.home() / ".kaggle"
          kaggle_dir.mkdir(exist_ok=True)
          (kaggle_dir / "kaggle.json").write_text(os.environ["KAGGLE_API_TOKEN"])
          (kaggle_dir / "kaggle.json").chmod(0o600)

          api = kaggle.KaggleApi()
          api.authenticate()

          response = api.competitions_list(sort_by="earliestDeadline", page_size=20)
          comps = response.competitions if hasattr(response, "competitions") else list(response)

          # stdout にも出力（gh run view --log で取得できるように）
          print(f"## Kaggle Active Competitions ({len(comps)} found)\n")
          print(f"{'Deadline':<12} {'Category':<18} {'Reward':<10} {'Teams':<6} Title")
          print("-" * 80)
          for c in comps:
              title = (getattr(c, "title", "") or "")[:50]
              deadline = str(getattr(c, "deadline", "-") or "-")[:10]
              category = getattr(c, "category", "-") or "-"
              reward = getattr(c, "reward", "-") or "-"
              teams = str(getattr(c, "team_count", None) or getattr(c, "teamCount", "-"))
              print(f"{deadline:<12} {category:<18} {reward:<10} {teams:<6} {title}")

          # GitHub Step Summary にも書く
          out = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/null")
          with open(out, "a", encoding="utf-8") as f:
              f.write(f"## Kaggle Active Competitions ({len(comps)} found)\n\n")
              f.write("| Competition | Deadline | Category | Reward | Teams |\n")
              f.write("|---|---|---|---|---|\n")
              for c in comps:
                  title = (getattr(c, "title", "") or "")[:50]
                  deadline = str(getattr(c, "deadline", "-") or "-")[:10]
                  category = getattr(c, "category", "-") or "-"
                  reward = getattr(c, "reward", "-") or "-"
                  teams = str(getattr(c, "team_count", None) or getattr(c, "teamCount", "-"))
                  url = f"https://www.kaggle.com/competitions/{getattr(c, 'ref', '')}"
                  f.write(f"| [{title}]({url}) | {deadline} | {category} | {reward} | {teams} |\n")
          EOF
