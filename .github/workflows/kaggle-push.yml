name: Kaggle Kernels Push

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図'
        required: false
        type: string
      notebook_dir:
        description: 'Notebook directory (e.g., deep-past)'
        required: true
        type: string
      kernel_id:
        description: 'Kaggle kernel ID for polling (e.g., yasunorim/kernel-slug). Leave empty to skip.'
        required: false
        type: string

jobs:
  push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install kaggle CLI
        # Pin BOTH kaggle==2.0.0 AND its kagglesdk dep==0.1.15. The real breakage is in
        # kagglesdk: its latest wheel is missing the `competitions.legacy` subpackage, so
        # `import kaggle` dies with `ModuleNotFoundError: No module named
        # 'kagglesdk.competitions.legacy'` and every push fails — pinning kaggle alone does
        # NOT help because kagglesdk resolves to its own (broken) latest. 2.0.0 + 0.1.15 is
        # the combo verified working locally; supports KAGGLE_API_TOKEN env auth.
        run: pip install 'kaggle==2.0.0' 'kagglesdk==0.1.15' lightgbm xgboost wandb

      - name: Generate notebook (if generate_notebook.py exists)
        run: |
          DIR="${{ inputs.notebook_dir }}"
          if [ -f "$DIR/generate_notebook.py" ]; then
            echo "Running generate_notebook.py in $DIR"
            cd "$DIR" && python generate_notebook.py
          else
            echo "No generate_notebook.py found, skipping."
          fi

      - name: Push notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          KERNEL_ID="${{ inputs.kernel_id }}"
          # Capture the kernel's lastRunTime BEFORE pushing. The poll step uses it to
          # tell a NEW run's terminal status apart from the PREVIOUS run's stale
          # COMPLETE/ERROR (2026-07-02: stale COMPLETE was accepted as success while
          # the push had silently failed on GPU quota).
          if [ -n "$KERNEL_ID" ]; then
            PRE_LRT=$(kaggle kernels list --user "${KERNEL_ID%%/*}" --search "${KERNEL_ID#*/}" --page-size 100 -v 2>/dev/null \
              | awk -F, -v k="$KERNEL_ID" '$1==k{print $4}')
            echo "PRE_LRT=$PRE_LRT" >> "$GITHUB_ENV"
            echo "lastRunTime before push: ${PRE_LRT:-<none>}"
          fi
          # kaggle CLI exits 0 even on "Kernel push error: ..." (e.g. weekly GPU quota
          # exhausted), so require the explicit success marker in the output.
          RC=0
          OUT=$(kaggle kernels push -p "${{ inputs.notebook_dir }}" 2>&1) || RC=$?
          echo "$OUT"
          if [ "$RC" -ne 0 ] || ! echo "$OUT" | grep -q "successfully pushed"; then
            echo "::error::kaggle kernels push did not confirm success (see output above)"
            exit 1
          fi

      - name: Poll until complete (max 90min)
        if: ${{ inputs.kernel_id != '' }}
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          KERNEL_ID="${{ inputs.kernel_id }}"

          get_lrt() {
            kaggle kernels list --user "${KERNEL_ID%%/*}" --search "${KERNEL_ID#*/}" --page-size 100 -v 2>/dev/null \
              | awk -F, -v k="$KERNEL_ID" '$1==k{print $4}'
          }

          # Wait for kernel to register on Kaggle (stale status防止)
          echo "Waiting 60s for Kaggle to register push..."
          sleep 60
          echo "Waiting for kernel to start... (lastRunTime before push: ${PRE_LRT:-<none>})"
          STARTED=false
          for i in $(seq 1 30); do
            RAW=$(kaggle kernels status "$KERNEL_ID" 2>&1) || true
            STATUS=$(echo "$RAW" | sed 's/.*has status "\([^"]*\)".*/\1/')
            if [ $((i % 5)) -eq 0 ]; then
              echo "Startup check $i/30: $STATUS"
            fi
            if echo "$STATUS" | grep -qiE "RUNNING|QUEUED"; then
              echo "Kernel is now running: $STATUS"
              STARTED=true
              break
            fi
            # Terminal status during startup is trustworthy ONLY if lastRunTime moved
            # past its pre-push value — otherwise it is the PREVIOUS run's stale state
            # (2026-07-02: stale COMPLETE was reported as success in ~1min while the
            # new version never ran). Fast kernels still exit here via the LRT check.
            if echo "$STATUS" | grep -qiE "COMPLETE|ERROR|CANCEL"; then
              CUR_LRT=$(get_lrt)
              if [ -n "$PRE_LRT" ] && [ -n "$CUR_LRT" ] && [ "$CUR_LRT" != "$PRE_LRT" ]; then
                if echo "$STATUS" | grep -qiE "complete_empty|ERROR|CANCEL"; then
                  echo "Kernel failed during startup with status: $STATUS"
                  exit 1
                fi
                echo "Kernel completed successfully (fast path, lastRunTime $PRE_LRT -> $CUR_LRT): $STATUS"
                exit 0
              fi
              echo "Ignoring stale terminal status $STATUS (lastRunTime unchanged: ${CUR_LRT:-<none>})"
            fi
            sleep 30
          done
          if [ "$STARTED" = "false" ]; then
            echo "Kernel never started (stuck at stale status). Last: $STATUS"
            exit 1
          fi

          # Poll for completion
          for i in $(seq 1 180); do
            RAW=$(kaggle kernels status "$KERNEL_ID" 2>&1) || true
            STATUS=$(echo "$RAW" | sed 's/.*has status "\([^"]*\)".*/\1/')
            echo "Attempt $i/180: $STATUS"
            # COMPLETE_EMPTY = no output (error) — check before COMPLETE
            if echo "$STATUS" | grep -qiE "complete_empty|ERROR|CANCEL"; then
              echo "Kernel failed with status: $STATUS"
              exit 1
            fi
            if echo "$STATUS" | grep -qiE "COMPLETE"; then
              echo "Kernel completed successfully."
              break
            fi
            if [ "$i" -eq 180 ]; then
              echo "Timeout: kernel did not complete in 90 minutes."
              exit 1
            fi
            sleep 30
          done

      - name: Show kernel diagnostics on failure
        if: failure() && inputs.kernel_id != ''
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          echo "=== Kernel ERROR: downloading diagnostics ==="
          SLUG=$(echo "${{ inputs.kernel_id }}" | cut -d'/' -f2)
          mkdir -p ./kernel_log_out
          kaggle kernels output "${{ inputs.kernel_id }}" -p ./kernel_log_out || true
          LOG_FILE="./kernel_log_out/${SLUG}.log"
          if [ -f "$LOG_FILE" ]; then
            echo "--- stdout ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); [print(e['data'],end='') for e in entries if e.get('stream_name')=='stdout']" || true
            echo ""
            echo "--- last 30 stderr lines ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); errs=[e['data'] for e in entries if e.get('stream_name')=='stderr']; print(''.join(errs[-30:]),end='')" || true
          else
            echo "No log file found. Files in kernel_log_out/:"
            ls -la ./kernel_log_out/ || true
          fi

      - name: Notify Discord (success)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"✅ **Kaggle Kernel完了**\nDir: \`${{ inputs.notebook_dir }}\`\nKernel: \`${{ inputs.kernel_id }}\`\nMemo: ${{ inputs.memo }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

      - name: Notify Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **Kaggle Kernel失敗**\nDir: \`${{ inputs.notebook_dir }}\`\nKernel: \`${{ inputs.kernel_id }}\`\nMemo: ${{ inputs.memo }}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
