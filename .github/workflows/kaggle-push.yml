name: Kaggle Kernels Push

on:
  workflow_dispatch:
    inputs:
      notebook_dir:
        description: 'Notebook directory (e.g., deep-past)'
        required: true
        type: string
      kernel_id:
        description: 'Kaggle kernel ID for polling (e.g., yasunorim/kernel-slug). Leave empty to skip.'
        required: false
        type: string

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install kaggle CLI
        run: pip install kaggle lightgbm xgboost wandb

      - name: Generate notebook (if generate_notebook.py exists)
        run: |
          DIR="${{ inputs.notebook_dir }}"
          if [ -f "$DIR/generate_notebook.py" ]; then
            echo "Running generate_notebook.py in $DIR"
            cd "$DIR" && python generate_notebook.py
          else
            echo "No generate_notebook.py found, skipping."
          fi

      - name: Push notebook to Kaggle
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: kaggle kernels push -p "${{ inputs.notebook_dir }}"

      - name: Poll until complete (max 60 x 30s = 30min)
        if: ${{ inputs.kernel_id != '' }}
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          KERNEL_ID="${{ inputs.kernel_id }}"
          for i in $(seq 1 60); do
            RAW=$(kaggle kernels status "$KERNEL_ID" 2>&1) || true
            STATUS=$(echo "$RAW" | sed 's/.*has status "\([^"]*\)".*/\1/')
            echo "Attempt $i/60: $STATUS"
            if echo "$STATUS" | grep -qiE "COMPLETE"; then
              echo "Kernel completed successfully."
              break
            fi
            if echo "$STATUS" | grep -qiE "ERROR|CANCEL"; then
              echo "Kernel failed with status: $STATUS"
              exit 1
            fi
            if [ "$i" -eq 60 ]; then
              echo "Timeout: kernel did not complete in 30 minutes."
              exit 1
            fi
            sleep 30
          done

      - name: Show kernel diagnostics on failure
        if: failure() && inputs.kernel_id != ''
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          echo "=== Kernel ERROR: downloading diagnostics ==="
          SLUG=$(echo "${{ inputs.kernel_id }}" | cut -d'/' -f2)
          mkdir -p ./kernel_log_out
          kaggle kernels output "${{ inputs.kernel_id }}" -p ./kernel_log_out || true
          LOG_FILE="./kernel_log_out/${SLUG}.log"
          if [ -f "$LOG_FILE" ]; then
            echo "--- stdout ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); [print(e['data'],end='') for e in entries if e.get('stream_name')=='stdout']" || true
            echo ""
            echo "--- last 30 stderr lines ---"
            python3 -c "import json; entries=json.load(open('$LOG_FILE')); errs=[e['data'] for e in entries if e.get('stream_name')=='stderr']; print(''.join(errs[-30:]),end='')" || true
          else
            echo "No log file found. Files in kernel_log_out/:"
            ls -la ./kernel_log_out/ || true
          fi
